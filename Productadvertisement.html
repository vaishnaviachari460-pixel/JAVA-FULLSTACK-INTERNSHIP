<!DOCTYPE html>
<html>
<head>
    <title>Product Advertisement</title>
    <style>
        .product { text-align: center; }
        .price { text-align: right; color: green; }
        .description { text-align: justify; }
        .button { text-align: center; }
    </style>
</head>
<body>

<h1 class="product">Smart Fitness Watch</h1>

<h2 class="price">Price: ₹2999</h2>

<p class="description">
    This smart fitness watch helps you track your daily activities, heart rate, and sleep patterns. 
    It is lightweight, stylish, and perfect for fitness enthusiasts.
</p>

<div class="button">
    <button>Buy Now</button>
</div>

</body>
</html>
