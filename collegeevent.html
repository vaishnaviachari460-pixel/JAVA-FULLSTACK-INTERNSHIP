<!DOCTYPE html>
<html>
<head>
    <title>College Event Registration</title>

    <script>
        function showSummary() {
            let events = [];
            if (document.getElementById("dance").checked) events.push("Dance");
            if (document.getElementById("coding").checked) events.push("Coding");
            if (document.getElementById("singing").checked) events.push("Singing");

            document.getElementById("summary").innerHTML =
                "Selected Events: " + events.join(", ");
        }
    </script>
</head>

<body>

<h1>College Event Registration</h1>

<!-- Audio Invitation -->
<h3>Listen to Event Invitation</h3>
<audio controls>
    <source src="invitation.mp3" type="audio/mpeg">
    Your browser does not support audio.
</audio>

<hr>

<form oninput="showSummary()">

    <!-- Name -->
    Student Name:
    <input type="text" required><br><br>

    <!-- Email with pattern -->
    Email:
    <input type="email" pattern="^[a-zA-Z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" required>
    <br><br>

    <!-- Department -->
    Department:
    <input type="text" required><br><br>

    <!-- Events -->
    <h3>Select Events:</h3>
    <input type="checkbox" id="dance"> Dance<br>
    <input type="checkbox" id="coding"> Coding<br>
    <input type="checkbox" id="singing"> Singing<br><br>

    <!-- File Upload -->
    Upload Performance Sample:
    <input type="file" accept=".mp3, .mp4" required>
    <br><br>

    <!-- Summary -->
    <p id="summary">Selected Events: None</p>

    <!-- Buttons -->
    <input type="submit" value="Register">
    <input type="reset" value="Reset">

</form>

</body>
</html>
