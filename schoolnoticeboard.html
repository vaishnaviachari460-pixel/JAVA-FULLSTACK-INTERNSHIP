<!DOCTYPE html>
<html>
<head>
    <title>School Notice Board</title>
    <style>
        .school { text-align: center; }
        .date { text-align: right; }
        .content { text-align: justify; }
        .important { 
            text-align: center; 
            color: red; 
            font-weight: bold; 
        }
        .footer { text-align: left; }
    </style>
</head>
<body>

<h1 class="school">ABC High School</h1>

<p class="date">Date: 01 April 2026</p>

<h2>Annual Day Notice</h2>

<p class="content">
    All students are informed that the Annual Day celebration will be held next week. 
    Participants must attend rehearsals regularly.
</p>

<p class="important">
    Important: Submit your names before Friday!
</p>

<hr>

<p class="footer">Principal Office</p>

</body>
</html>
