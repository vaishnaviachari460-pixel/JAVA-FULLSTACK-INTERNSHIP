<!DOCTYPE html>
<html>
<head>
    <title>Center Box Tasks</title>
    <style>
        /* -------- Task 1 -------- */
        .box1 {
            width: 300px;
            height: 100px;
            border: 2px solid black;

            /* Center text inside */
            text-align: center;
            line-height: 100px;

            /* Center box horizontally */
            margin: 20px auto;
        }

        /* -------- Task 2 -------- */
        .container {
            height: 100vh;

            /* Flexbox */
            display: flex;
            justify-content: center;   /* horizontal center */
            align-items: center;       /* vertical center */
        }

        .box2 {
            width: 300px;
            height: 100px;
            border: 2px solid blue;

            /* Center text inside */
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

<h2>Task 1: Horizontal Center</h2>
<div class="box1">
    Centered Text
</div>

<hr>

<h2>Task 2: Full Center using Flexbox</h2>
<div class="container">
    <div class="box2">
        Fully Centered Box
    </div>
</div>

</body>
</html>
